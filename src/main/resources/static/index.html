<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Queue Dashboard</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success: #2ecc71;
            --warning: #f1c40f;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin-bottom: 20px; }

        .dashboard-container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            gap: 20px;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            flex: 1;
            text-align: center;
        }

        .stat-card h3 { margin: 0; font-size: 1.2rem; color: #7f8c8d; }
        .stat-card .value { font-size: 2rem; font-weight: bold; margin-top: 10px; }

        .panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        input, select, button {
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 1rem;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover { background-color: #2980b9; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ecf0f1;
        }

        th { background-color: #f8f9fa; }

        .status-PENDING { color: var(--warning); font-weight: bold; }
        .status-RUNNING { color: var(--accent-color); font-weight: bold; }
        .status-COMPLETED { color: var(--success); font-weight: bold; }
        .status-FAILED { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

<h1>Job Queue Dashboard</h1>

<div class="dashboard-container">

    <div class="stats-row">
        <div class="stat-card">
            <h3>Pending Tasks</h3>
            <div class="value" id="pendingCount">0</div>
        </div>
        <div class="stat-card">
            <h3>Remaining Capacity</h3>
            <div class="value" id="remainingCapacity">0</div>
        </div>
        <div class="stat-card">
            <h3>Max Capacity</h3>
            <div class="value" id="maxCapacity">0</div>
        </div>
    </div>

    <div class="panel">
        <h2>Inject New Task</h2>
        <form id="taskForm" class="form-group">
            <select id="taskType" onchange="toggleInputs()">
                <option value="DUMMY">Dummy Task (Sleep)</option>
                <option value="AI">AI Summarize Task</option>
            </select>

            <input type="number" id="priority" placeholder="Priority (e.g., 10)" value="10" required>

            <input type="number" id="sleepDuration" placeholder="Sleep Duration (ms)" value="2000">
            <input type="text" id="aiText" placeholder="Text to summarize" style="display: none;">

            <button type="submit">Submit Task</button>
        </form>
        <div id="formMessage" style="margin-top: 10px; font-weight: bold;"></div>
    </div>

    <div class="panel">
        <h2>Task History</h2>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Type</th>
                <th>Status</th>
                <th>Result</th>
            </tr>
            </thead>
            <tbody id="tasksTableBody">
            </tbody>
        </table>
    </div>
</div>

<script>
    const API_BASE_URL = 'http://localhost:8080/api/tasks';

    function toggleInputs() {
        const type = document.getElementById('taskType').value;
        if (type === 'DUMMY') {
            document.getElementById('sleepDuration').style.display = 'inline-block';
            document.getElementById('aiText').style.display = 'none';
        } else {
            document.getElementById('sleepDuration').style.display = 'none';
            document.getElementById('aiText').style.display = 'inline-block';
        }
    }

    async function fetchQueueStatus() {
        try {
            const response = await fetch(`${API_BASE_URL}/status`);
            const data = await response.json();

            document.getElementById('pendingCount').innerText = data.pendingTasks;
            document.getElementById('remainingCapacity').innerText = data.remainingCapacity;
            document.getElementById('maxCapacity').innerText = data.maxCapacity;
        } catch (error) {
            console.error("Error fetching queue status:", error);
        }
    }

    async function fetchAllTasks() {
        try {
            const response = await fetch(`${API_BASE_URL}/all`);
            const tasks = await response.json();

            const tbody = document.getElementById('tasksTableBody');
            tbody.innerHTML = '';

            tasks.forEach(task => {
                const row = `<tr>
                        <td>${task.id}</td>
                        <td>${task.type}</td>
                        <td class="status-${task.status}">${task.status}</td>
                        <td>${task.result ? task.result : '-'}</td>
                    </tr>`;
                tbody.innerHTML += row;
            });
        } catch (error) {
            console.error("Error fetching tasks:", error);
        }
    }

    document.getElementById('taskForm').addEventListener('submit', async function(event) {
        event.preventDefault();

        const type = document.getElementById('taskType').value;
        const priority = parseInt(document.getElementById('priority').value);
        const messageBox = document.getElementById('formMessage');

        const requestBody = {
            type: type,
            priority: priority,
            sleepDuration: type === 'DUMMY' ? parseInt(document.getElementById('sleepDuration').value) : 0,
            text: type === 'AI' ? document.getElementById('aiText').value : null
        };

        try {
            const response = await fetch(`${API_BASE_URL}/add`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });

            const responseText = await response.text();

            if (response.ok) {
                messageBox.style.color = "green";
                messageBox.innerText = "Success: " + responseText;
            } else {
                messageBox.style.color = "red";
                messageBox.innerText = "Error: " + responseText;
            }

            fetchQueueStatus();
            fetchAllTasks();

        } catch (error) {
            messageBox.style.color = "red";
            messageBox.innerText = "Network Error: Could not reach the server.";
        }
    });

    setInterval(() => {
        fetchQueueStatus();
        fetchAllTasks();
    }, 1000);

    // הפעלה ראשונית בעת טעינת הדף
    fetchQueueStatus();
    fetchAllTasks();
</script>
</body>
</html>
